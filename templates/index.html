<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZeroLive - Free Sports Streams</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230B9444'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='17' font-weight='bold'>Z</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,[data-theme="dark"]{
  --bg:#07080a;
  --bg-elevated:#0e1015;
  --bg-card:#13161d;
  --bg-hover:#1a1e28;
  --accent:#0B9444;
  --accent-glow:rgba(11,148,68,.35);
  --accent-dim:rgba(11,148,68,.1);
  --text:#f0f2f5;
  --text-secondary:#9198a7;
  --text-tertiary:#5c6372;
  --line:rgba(255,255,255,.05);
  --line-hover:rgba(255,255,255,.1);
  --live:#ff4757;
  --live-dim:rgba(255,71,87,.12);
  --radius:12px;
  --radius-sm:8px;
  --radius-full:999px;
  --shadow-card:0 2px 20px rgba(0,0,0,.3);
  --transition:all .2s cubic-bezier(.4,0,.2,1);
  --surface:var(--bg-card);
}
[data-theme="light"]{
  --bg:#f5f7fa;--bg-elevated:#fff;--bg-card:#fff;--bg-hover:#f0f2f5;
  --accent:#0B9444;--accent-glow:rgba(11,148,68,.2);--accent-dim:rgba(11,148,68,.08);
  --text:#1a1d23;--text-secondary:#6b7280;--text-tertiary:#9ca3af;
  --line:rgba(0,0,0,.08);--line-hover:rgba(0,0,0,.12);
  --live:#e53935;--live-dim:rgba(229,57,53,.1);
  --shadow-card:0 2px 20px rgba(0,0,0,.08);
  --surface:var(--bg-card);
}
[data-theme="green"]{
  --bg:#050d06;--bg-elevated:#0a1a0e;--bg-card:#0d2412;--bg-hover:#12361a;
  --accent:#22d65e;--accent-glow:rgba(34,214,94,.3);--accent-dim:rgba(34,214,94,.1);
  --text:#e8f5e9;--text-secondary:#81c784;--text-tertiary:#4caf50;
  --line:rgba(76,175,80,.15);--line-hover:rgba(76,175,80,.25);
  --live:#ff5252;--live-dim:rgba(255,82,82,.15);
  --shadow-card:0 2px 20px rgba(0,0,0,.5);
  --surface:var(--bg-card);
}
[data-theme="aero"]{
  --bg:rgba(10,14,23,.85);--bg-elevated:rgba(20,28,45,.6);--bg-card:rgba(25,35,55,.45);--bg-hover:rgba(40,55,80,.5);
  --accent:#60a5fa;--accent-glow:rgba(96,165,250,.25);--accent-dim:rgba(96,165,250,.12);
  --text:#f0f4ff;--text-secondary:#a0b8e0;--text-tertiary:#6a80a8;
  --line:rgba(255,255,255,.08);--line-hover:rgba(255,255,255,.15);
  --live:#ff6b6b;--live-dim:rgba(255,107,107,.12);
  --shadow-card:0 8px 32px rgba(0,0,0,.3);
  --surface:rgba(30,42,65,.5);
}
[data-theme="aero"] body{background:linear-gradient(135deg,#0a0e17,#1a1f2e,#0f1624)}
[data-theme="aero"] .header{backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);background:rgba(10,14,23,.5)}
[data-theme="blue"]{
  --bg:#070b12;--bg-elevated:#0c1425;--bg-card:#111b30;--bg-hover:#172340;
  --accent:#3b82f6;--accent-glow:rgba(59,130,246,.3);--accent-dim:rgba(59,130,246,.1);
  --text:#f0f4ff;--text-secondary:#8ba4d4;--text-tertiary:#5a75a8;
  --line:rgba(59,130,246,.12);--line-hover:rgba(59,130,246,.2);
  --live:#ff4757;--live-dim:rgba(255,71,87,.12);
  --shadow-card:0 2px 20px rgba(0,0,0,.4);
  --surface:var(--bg-card);
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;background-image:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(11,148,68,.04),transparent)}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font:inherit;border:none;background:none;color:inherit}
img{max-width:100%;display:block}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-tertiary);border-radius:var(--radius-full)}
::-webkit-scrollbar-thumb:hover{background:var(--text-secondary)}

.header{position:sticky;top:0;z-index:100;backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);background:rgba(7,8,10,.8);border-bottom:1px solid var(--line)}
[data-theme="light"] .header{background:rgba(255,255,255,.85)}
[data-theme="green"] .header{background:rgba(5,13,6,.85)}
[data-theme="blue"] .header{background:rgba(7,11,18,.85)}
.header-inner{display:flex;align-items:center;gap:16px;max-width:1400px;margin:0 auto;padding:12px 24px}
.header-logo{font-size:20px;font-weight:900;letter-spacing:1px;color:var(--accent);white-space:nowrap;display:flex;align-items:center;gap:8px}
.header-logo span{color:var(--text)}
.header-logo svg{width:22px;height:22px}
.header-search-wrap{position:relative;flex:1;max-width:420px}
.header-search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-tertiary);pointer-events:none}
.header-search{width:100%;padding:9px 14px 9px 36px;background:var(--bg-card);border:1px solid var(--line);color:var(--text);border-radius:var(--radius-sm);outline:none;font-size:14px;transition:var(--transition)}
.header-search::placeholder{color:var(--text-tertiary)}
.header-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.header-actions{display:flex;gap:6px;margin-left:auto}

.theme-wrap{position:relative}
.theme-btn{display:flex;align-items:center;gap:5px;padding:7px 11px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--line);font-size:12px;font-weight:600;color:var(--text-secondary);transition:all .2s;white-space:nowrap}
.theme-btn:hover{border-color:var(--text-tertiary);color:var(--text)}
.theme-panel{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg-elevated);border:1px solid var(--line-hover);border-radius:var(--radius);padding:8px;box-shadow:var(--shadow-card);min-width:160px;display:none;z-index:200}
.theme-panel.open{display:block}
.theme-opt{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);transition:all .15s}
.theme-opt:hover{background:var(--bg-hover);color:var(--text)}
.theme-opt.active{color:var(--accent);font-weight:600}
.theme-opt .swatch{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:1px solid var(--line)}

.btn-m3u{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);background:var(--accent-dim);color:var(--accent);border:1px solid rgba(11,148,68,.25);font-size:13px;font-weight:600;transition:var(--transition);white-space:nowrap}
.btn-m3u:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-1px)}
.btn-refresh{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--radius-sm);color:var(--text-secondary);transition:all .2s;flex-shrink:0}
.btn-refresh:hover{background:var(--bg-card);color:var(--text)}
.btn-refresh.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.hero{position:relative;overflow:hidden;padding:56px 24px 48px;text-align:center}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.3}
.hero h1{font-size:clamp(28px,5vw,48px);font-weight:900;line-height:1.15;background:linear-gradient(135deg,#fff 40%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.hero p{color:var(--text-secondary);font-size:15px;max-width:480px;margin:0 auto}
.hero-info{display:flex;justify-content:center;gap:16px;margin-top:14px;font-size:13px;color:var(--text-tertiary)}
.hero-info .live-count{color:var(--live);font-weight:600}
.hero-featured{margin-top:28px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.featured-card{display:flex;align-items:center;gap:14px;padding:12px 18px;border-radius:var(--radius);background:var(--bg-card);border:1px solid var(--live);text-align:left;max-width:600px;width:100%;transition:var(--transition);position:relative;overflow:hidden}
.featured-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--live-dim),transparent 60%);pointer-events:none}
.featured-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,71,87,.15)}
.featured-live{display:flex;align-items:center;gap:6px;padding:3px 10px;border-radius:var(--radius-full);background:var(--live-dim);color:var(--live);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.featured-live .dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 1.5s infinite}
.featured-info{flex:1;min-width:0}
.featured-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.featured-meta{font-size:12px;color:var(--text-secondary);margin-top:2px}
.featured-arrow{color:var(--accent);font-size:18px;flex-shrink:0}

.content{max-width:1400px;margin:0 auto;padding:0 24px 24px}
.filter-bar{display:flex;gap:6px;padding:16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:7px 16px;border-radius:var(--radius-full);background:var(--bg-card);border:1px solid var(--line);font-size:13px;font-weight:500;color:var(--text-secondary);transition:var(--transition);white-space:nowrap}
.filter-chip:hover{border-color:var(--text-tertiary);color:var(--text)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;box-shadow:0 2px 12px var(--accent-glow)}
.filter-chip .count{opacity:.45;margin-left:4px}
.filter-chip.active .count{opacity:.7}
.live-chip{display:inline-flex;align-items:center;gap:5px}
.live-chip .dot{width:5px;height:5px;border-radius:50%;background:var(--live);animation:pulse 1.5s infinite}

@keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}

.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.event-card{display:block;position:relative;overflow:hidden;background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;transition:var(--transition)}
.event-card::after{content:'';position:absolute;inset:0;border-radius:var(--radius);opacity:0;transition:var(--transition);background:linear-gradient(135deg,transparent 60%,rgba(11,148,68,.04));pointer-events:none}
.event-card:hover{border-color:var(--line-hover);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.02)}
.event-card:hover::after{opacity:1}
.event-card.live{border-color:rgba(255,71,87,.25)}
.event-card.live:hover{border-color:rgba(255,71,87,.5);box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 0 1px rgba(255,71,87,.08)}
.event-card.starting-soon{border-color:rgba(250,204,21,.2)}
.event-card.starting-soon:hover{border-color:rgba(250,204,21,.35)}
.event-card .accent-bar{position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:var(--transition)}
.event-card:hover .accent-bar{opacity:1}
.event-card.live .accent-bar{background:var(--live);opacity:1}
.event-card.starting-soon .accent-bar{background:#facc15;opacity:1}
.event-card.upcoming .accent-bar{background:var(--text-tertiary)}

.event-top{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.event-sport{font-size:10px;font-weight:700;letter-spacing:.8px;padding:3px 10px;border-radius:var(--radius-full);text-transform:uppercase}
.event-league{font-size:12px;color:var(--text-secondary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.event-status{font-size:10px;font-weight:700;letter-spacing:.6px;padding:3px 8px;border-radius:var(--radius-full);text-transform:uppercase;white-space:nowrap}
.event-status.live{background:var(--live-dim);color:var(--live);animation:statusPulse 2s infinite}
.event-status.soon{background:rgba(250,204,21,.12);color:#facc15}
.event-status.upcoming{background:rgba(255,255,255,.04);color:var(--text-tertiary)}

.event-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;margin-bottom:16px}
.team{text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.team-logo-wrap{width:56px;height:56px;border-radius:50%;overflow:hidden;background:var(--bg);border:2px solid var(--line);display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.event-card:hover .team-logo-wrap{border-color:var(--text-tertiary)}
.event-card.live .team-logo-wrap{border-color:rgba(255,71,87,.3)}
.event-card.live:hover .team-logo-wrap{border-color:rgba(255,71,87,.5)}
.team-logo{width:100%;height:100%;object-fit:cover}
.team-fallback{font-weight:800;font-size:15px;color:var(--text-secondary)}
.team-name{font-size:14px;font-weight:600;line-height:1.2}
.vs-block{text-align:center;min-width:70px}
.vs-text{font-size:13px;font-weight:800;color:var(--text-tertiary);letter-spacing:1px}
.event-card.live .vs-text{color:var(--live)}
.event-card.starting-soon .vs-text{color:#facc15}
.vs-time{font-size:11px;color:var(--text-tertiary);margin-top:6px;white-space:nowrap}
.event-card.live .vs-time{color:var(--live);font-weight:600}
.event-card.starting-soon .vs-time{color:#facc15}

.event-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid var(--line)}
.event-cta{font-size:12px;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;gap:5px;transition:var(--transition)}
.event-card:hover .event-cta{color:var(--accent)}
.event-card.live .event-cta{color:var(--live)}
.event-card.live:hover .event-cta{color:var(--live)}

.skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.skeleton-card{background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;height:240px;position:relative;overflow:hidden}
.skeleton-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent 25%,rgba(255,255,255,.02) 50%,transparent 75%);background-size:200% 100%;animation:shimmer 1.8s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.7}}

.empty-state{grid-column:1/-1;text-align:center;padding:60px 24px;color:var(--text-secondary)}
.empty-state svg{width:48px;height:48px;color:var(--text-tertiary);margin-bottom:16px;opacity:.4}
.empty-state h3{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:14px}
.upcoming-notice{grid-column:1/-1;text-align:center;padding:12px;margin-top:8px;font-size:13px;color:var(--text-tertiary);background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius-sm)}

.footer{text-align:center;padding:32px 24px;color:var(--text-tertiary);font-size:13px;border-top:1px solid var(--line);margin-top:32px}
.footer a{color:var(--accent)}
.footer-hint{margin-top:8px;font-size:12px;opacity:.6}

@media(max-width:700px){
  .header-inner{padding:10px 16px;gap:10px}
  .header-search-wrap{max-width:none}
  .header-search{font-size:13px}
  .btn-m3u{padding:5px 10px;font-size:12px}
  .hero{padding:36px 16px 32px}
  .content{padding:0 14px 14px}
  .events-grid{grid-template-columns:1fr}
  .skeleton-grid{grid-template-columns:1fr}
  .featured-card{padding:10px 14px}
  .featured-title{font-size:13px}
}
@media(max-width:400px){.team-logo-wrap{width:46px;height:46px}.team-name{font-size:13px}.vs-block{min-width:55px}}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="/" class="header-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>ZERO<span>LIVE</span></a>
    <div class="header-search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" class="header-search" placeholder="Search teams, leagues..." autocomplete="off">
    </div>
    <div class="header-actions">
      <button class="btn-refresh" id="refreshBtn" title="Refresh events"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg></button>
      <div class="theme-wrap">
        <button class="theme-btn" id="themeToggle" title="Switch theme"><svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
        <div class="theme-panel" id="themePanel">
          <button class="theme-opt active" data-theme="dark"><span class="swatch" style="background:#07080a;border-color:#333"></span>Dark</button>
          <button class="theme-opt" data-theme="light"><span class="swatch" style="background:#f5f7fa;border-color:#ddd"></span>Light</button>
          <button class="theme-opt" data-theme="green"><span class="swatch" style="background:#0d2412;border-color:#22d65e"></span>Green</button>
          <button class="theme-opt" data-theme="aero"><span class="swatch" style="background:linear-gradient(135deg,#0a0e17,#1a1f2e);border-color:#60a5fa"></span>Aero Glass</button>
          <button class="theme-opt" data-theme="blue"><span class="swatch" style="background:#111b30;border-color:#3b82f6"></span>Blue</button>
        </div>
      </div>
      <a href="/playlist.m3u" class="btn-m3u" download><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 20 8-12-8-4-4 8z"/><path d="M14 20h8"/><path d="M18 16v4"/></svg>M3U</a>
    </div>
  </div>
</header>

<section class="hero">
  <h1>Live Sports, Zero Bullshit</h1>
  <p>Free streams for football, cricket, basketball, tennis, and more.</p>
  <div class="hero-info" id="heroInfo"></div>
  <div class="hero-featured" id="heroFeatured"></div>
</section>

<main class="content">
  <nav class="filter-bar" id="filterBar"></nav>
  <div id="eventsGrid"></div>
</main>

<footer class="footer">
  ZeroLive &mdash; Free sports streaming
  <div class="footer-hint"><a href="/playlist.m3u" download>Download M3U</a> &middot; Open in VLC / IPTV app</div>
</footer>

<script>
(function(){
  var E=function(s){return String(s??'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];})};
  var INIT=function(n){return (n||'?').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0].toUpperCase();}).join('');};
  var ESC_INIT=function(n){return E(INIT(n));};
  var SPORT_COLORS={Football:'#22c55e',Cricket:'#3b82f6',Basketball:'#f97316',Tennis:'#eab308',Hockey:'#06b6d4',Baseball:'#a16207','Formula 1':'#ef4444',F1:'#ef4444',Esports:'#a855f7',MMA:'#dc2626',WWE:'#ef4444'};
  var sportColor=function(s){return SPORT_COLORS[s]||'#6b7280';};

  var events=[];
  var activeSport='All';
  var query='';
  var search=document.getElementById('search');
  var filterBar=document.getElementById('filterBar');
  var grid=document.getElementById('eventsGrid');
  var heroFeatured=document.getElementById('heroFeatured');
  var heroInfo=document.getElementById('heroInfo');
  var refreshBtn=document.getElementById('refreshBtn');

  function getStatus(e){
    var now=Date.now();
    var t=Date.parse(e.starts_at);
    if(e.is_live===1) return {type:'live',label:'● LIVE',cls:'live'};
    if(!t) return {type:'upcoming',label:'UNKNOWN',cls:'upcoming'};
    var diff=t-now;
    if(diff<0) return {type:'live',label:'● LIVE',cls:'live'};
    if(diff<3600000) return {type:'soon',label:'STARTING SOON',cls:'soon'};
    return {type:'upcoming',label:'UPCOMING',cls:'upcoming'};
  }

  function getTimeDisplay(e){
    var now=Date.now();
    var t=Date.parse(e.starts_at);
    if(!t)return'';
    var diff=t-now;
    if(diff<0){
      var ago=Math.floor(-diff/1000);
      if(ago<60)return'Started moments ago';
      if(ago<3600){var m=Math.floor(ago/60);return'Started '+m+'m ago';}
      if(ago<86400){var h=Math.floor(ago/3600);var m=Math.floor((ago%3600)/60);return h+'h '+m+'m elapsed';}
      var d=Math.floor(ago/86400);return d+'d ago';
    }else if(diff<3600000){
      var min=Math.floor(diff/60000);
      if(min<1)return'Starting now';
      return'In '+min+' min';
    }else{
      return new Date(t).toLocaleString();
    }
  }

  function showSkeletons(){grid.innerHTML='<div class="skeleton-grid">'+Array(8).fill('<div class="skeleton-card"><div class="skeleton-shimmer"></div></div>').join('')+'</div>';}
  showSkeletons();

  function render(){
    var q=query.trim().toLowerCase();
    var f=events.filter(function(e){
      var s=getStatus(e);
      if(activeSport==='__live__'&&s.type!=='live')return false;
      if(activeSport!=='All'&&activeSport!=='__live__'&&e.sport!==activeSport)return false;
      if(!q)return true;
      return (e.team_a_name||'').toLowerCase().includes(q)||(e.team_b_name||'').toLowerCase().includes(q)||(e.league||'').toLowerCase().includes(q);
    });
    f.sort(function(a,b){return (a.priority||0)-(b.priority||0);});
    if(!f.length){
      grid.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><h3>No events found</h3><p>Try adjusting your filters or search terms.</p></div>';
      return;
    }
    grid.innerHTML=f.map(function(e){
      var slug=e.enc_parent||e.parent||e.id;
      var s=getStatus(e);
      var timeStr=getTimeDisplay(e);
      var color=sportColor(e.sport);
      var live=s.type==='live';
      var soon=s.type==='soon';
      var cls=live?'live':soon?'starting-soon':'upcoming';
      var icon=live?'▶':soon?'⏳':'⌛';
      return '<a class="event-card '+cls+'" href="/watch/'+encodeURIComponent(slug)+'">'+
        '<div class="accent-bar"></div>'+
        '<div class="event-top">'+
          '<span class="event-sport" style="background:'+color+'18;color:'+color+'">'+E(e.sport||'Sports')+'</span>'+
          '<span class="event-league">'+E(e.league||'')+'</span>'+
          '<span class="event-status '+s.cls+'">'+s.label+'</span>'+
        '</div>'+
        '<div class="event-teams">'+
          '<div class="team"><div class="team-logo-wrap">'+
            (e.team_a_logo
              ? '<img src="'+E(e.team_a_logo)+'" alt="" class="team-logo" data-init="'+ESC_INIT(e.team_a_name)+'" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'team-fallback\',textContent:this.dataset.init}))">'
              : '<div class="team-fallback">'+ESC_INIT(e.team_a_name)+'</div>')+
          '</div><div class="team-name">'+E(e.team_a_name)+'</div></div>'+
          '<div class="vs-block"><div class="vs-text">VS</div><div class="vs-time">'+timeStr+'</div></div>'+
          '<div class="team"><div class="team-logo-wrap">'+
            (e.team_b_logo
              ? '<img src="'+E(e.team_b_logo)+'" alt="" class="team-logo" data-init="'+ESC_INIT(e.team_b_name)+'" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'team-fallback\',textContent:this.dataset.init}))">'
              : '<div class="team-fallback">'+ESC_INIT(e.team_b_name)+'</div>')+
          '</div><div class="team-name">'+E(e.team_b_name)+'</div></div>'+
        '</div>'+
        '<div class="event-bottom">'+
          '<span class="event-cta">'+icon+' '+(live?'Watch Live':soon?'View Stream':'View Stream')+'</span>'+
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-tertiary);opacity:.4"><path d="M9 18l6-6-6-6"/></svg>'+
        '</div></a>';
    }).join('');
    // Update timers every 30s for live displays
    clearTimeout(window._timer);
    window._timer=setTimeout(function(){render();},30000);
  }

  function renderFilters(){
    var counts=new Map();counts.set('All',events.length);
    var liveCount=0;var nowCount=0;
    for(var i=0;i<events.length;i++){
      var e=events[i];var s=e.sport||'Other';
      counts.set(s,(counts.get(s)||0)+1);
      if(getStatus(e).type==='live')liveCount++;
      if(Date.parse(e.starts_at))nowCount++;
    }
    var sports=['All'];
    var keys=Array.from(counts.keys()).filter(function(s){return s!=='All';}).sort();
    sports=sports.concat(keys);
    filterBar.innerHTML=sports.map(function(s){
      return '<button class="filter-chip '+(activeSport===s?'active':'')+'" data-sport="'+E(s)+'">'+E(s)+' <span class="count">'+(counts.get(s)||0)+'</span></button>';
    }).join('');
    filterBar.querySelectorAll('.filter-chip').forEach(function(el){
      el.addEventListener('click',function(){activeSport=el.dataset.sport;renderFilters();render();});
    });
    if(liveCount){
      var chip=document.createElement('button');
      chip.className='filter-chip '+(activeSport==='__live__'?'active':'');
      chip.dataset.sport='__live__';
      chip.innerHTML='<span class="live-chip"><span class="dot"></span> LIVE</span> <span class="count">'+liveCount+'</span>';
      chip.addEventListener('click',function(){activeSport='__live__';renderFilters();render();});
      filterBar.prepend(chip);
    }
    heroInfo.innerHTML='<span class="live-count">● '+liveCount+' live</span> <span>·</span> <span>'+nowCount+' events</span>';
    var liveEvents=events.filter(function(e){return getStatus(e).type==='live';}).slice(0,3);
    heroFeatured.innerHTML=liveEvents.map(function(e){
      var slug=e.enc_parent||e.parent||e.id;
      return '<a href="/watch/'+encodeURIComponent(slug)+'" class="featured-card">'+
        '<span class="featured-live"><span class="dot"></span> LIVE</span>'+
        '<span class="featured-info"><span class="featured-title">'+E(e.team_a_name)+' vs '+E(e.team_b_name)+'</span>'+
        '<span class="featured-meta">'+E(e.league||e.sport||'')+'</span></span>'+
        '<span class="featured-arrow">→</span></a>';
    }).join('');
  }

  search.addEventListener('input',function(e){query=e.target.value;render();});

  function loadEvents(){
    refreshBtn.classList.add('spinning');
    fetch('/api/upstream/events',{cache:'no-store'}).then(function(r){return r.json();}).then(function(data){
      events=(data&&Array.isArray(data.events))?data.events:(Array.isArray(data)?data:[]);
      renderFilters();render();
    })['catch'](function(){
      grid.innerHTML='<div class="empty-state"><h3>Failed to load events</h3><p>Check your connection and try again.</p></div>';
    }).then(function(){refreshBtn.classList.remove('spinning');});
  }
  refreshBtn.addEventListener('click',loadEvents);
  loadEvents();

  setInterval(function(){
    fetch('/api/upstream/events',{cache:'no-store'}).then(function(r){return r.json();}).then(function(data){
      events=(data&&Array.isArray(data.events))?data.events:(Array.isArray(data)?data:[]);
      renderFilters();render();
    })['catch'](function(){});
  },60000);

  /* Theme */
  var themeNames={dark:'Dark',light:'Light',green:'Green',aero:'Aero Glass',blue:'Blue'};
  var themeIcons={dark:'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>',light:'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>',green:'<path d="M2 22L12 2l10 20H2z"/><circle cx="12" cy="16" r="2"/>',aero:'<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>',blue:'<circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>'};
  var themeToggle=document.getElementById('themeToggle');
  var themeIcon=document.getElementById('themeIcon');
  var themePanel=document.getElementById('themePanel');
  var currentTheme=localStorage.getItem('zl-theme')||'dark';
  function applyTheme(t){
    document.documentElement.dataset.theme=t;
    themeIcon.innerHTML=themeIcons[t]||themeIcons.dark;
    localStorage.setItem('zl-theme',t);
    themePanel.querySelectorAll('.theme-opt').forEach(function(el){el.classList.toggle('active',el.dataset.theme===t);});
  }
  applyTheme(currentTheme);
  themeToggle.addEventListener('click',function(e){e.stopPropagation();themePanel.classList.toggle('open');});
  themePanel.querySelectorAll('.theme-opt').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();applyTheme(this.dataset.theme);themePanel.classList.remove('open');});
  });
  document.addEventListener('click',function(){themePanel.classList.remove('open');});
})();
</script>
</body>
</html>
