<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZeroLive - Free Sports Streams</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='url(%23g)'/><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23ff2d55'/><stop offset='100%25' stop-color='%237936f7'/></linearGradient></defs><text x='16' y='22' text-anchor='middle' fill='white' font-size='17' font-weight='bold'>Z</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080b14;
  --bg-elevated:#0d1225;
  --bg-card:#111830;
  --bg-hover:#1a2340;
  --accent-1:#ff2d55;
  --accent-2:#7936f7;
  --accent-glow:rgba(121,54,247,.35);
  --text:#eef2ff;
  --text-secondary:#949dcc;
  --text-tertiary:#5c6692;
  --line:rgba(121,54,247,.12);
  --line-hover:rgba(121,54,247,.25);
  --live:#ff2d55;
  --live-dim:rgba(255,45,85,.12);
  --radius:14px;
  --radius-sm:10px;
  --radius-full:999px;
  --shadow:0 8px 40px rgba(0,0,0,.5);
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;overflow-x:hidden;
  position:relative;
}

body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 40% 50% at 20% 10%,rgba(255,45,85,.08),transparent),
    radial-gradient(ellipse 50% 60% at 80% 90%,rgba(121,54,247,.08),transparent),
    radial-gradient(ellipse 30% 30% at 50% 50%,rgba(255,45,85,.03),transparent);
  animation:bgShift 20s ease-in-out infinite;
}

@keyframes bgShift{
  0%,100%{transform:translate(0,0)}
  33%{transform:translate(2%,-1%)}
  66%{transform:translate(-1%,2%)}
}

.orb{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  filter:blur(80px);animation:orbFloat 15s ease-in-out infinite;
}
.orb-1{width:400px;height:400px;background:rgba(255,45,85,.12);top:-100px;right:-100px;animation-delay:0s}
.orb-2{width:350px;height:350px;background:rgba(121,54,247,.10);bottom:-80px;left:-80px;animation-delay:-5s}
.orb-3{width:300px;height:300px;background:rgba(255,45,85,.06);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-10s}

@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(30px,-30px) scale(1.1)}
  50%{transform:translate(-20px,20px) scale(.95)}
  75%{transform:translate(15px,30px) scale(1.05)}
}

a{color:inherit;text-decoration:none}
button{cursor:pointer;font:inherit;border:none;background:none;color:inherit}
img{max-width:100%;display:block}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-tertiary);border-radius:var(--radius-full)}
::-webkit-scrollbar-thumb:hover{background:var(--text-secondary)}

.header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,11,20,.75);
  backdrop-filter:blur(24px) saturate(1.5);
  -webkit-backdrop-filter:blur(24px) saturate(1.5);
  border-bottom:1px solid var(--line);
}
.header-inner{
  display:flex;align-items:center;gap:16px;
  max-width:1400px;margin:0 auto;padding:12px 24px;
  position:relative;z-index:1;
}
.logo{
  font-size:20px;font-weight:900;letter-spacing:1px;
  white-space:nowrap;display:flex;align-items:center;gap:8px;
}
.logo-icon{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;
  box-shadow:0 2px 12px rgba(255,45,85,.3);
}
.logo-text{
  background:linear-gradient(135deg,#fff 30%,var(--accent-1),var(--accent-2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.search-wrap{position:relative;flex:1;max-width:400px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-tertiary);pointer-events:none}
.search-input{
  width:100%;padding:9px 14px 9px 36px;
  background:var(--bg-card);border:1px solid var(--line);
  color:var(--text);border-radius:var(--radius-sm);
  outline:none;font-size:13px;transition:all .25s;
}
.search-input::placeholder{color:var(--text-tertiary)}
.search-input:focus{border-color:var(--accent-2);box-shadow:0 0 0 3px rgba(121,54,247,.15)}
.header-actions{display:flex;gap:8px;margin-left:auto}
.btn-icon{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:var(--radius-sm);
  color:var(--text-secondary);transition:all .2s;
}
.btn-icon:hover{background:var(--bg-card);color:var(--text)}
.btn-icon.spinning svg{animation:spin .8s linear infinite}
.btn-m3u{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,rgba(255,45,85,.12),rgba(121,54,247,.12));
  color:var(--text);border:1px solid var(--line);
  font-size:12px;font-weight:600;transition:all .25s;white-space:nowrap;
}
.btn-m3u:hover{
  background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
  color:#fff;border-color:transparent;transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(255,45,85,.25);
}

.hero{
  position:relative;z-index:1;
  padding:64px 24px 40px;text-align:center;overflow:hidden;
}
.hero h1{
  font-size:clamp(32px,6vw,56px);font-weight:900;line-height:1.1;
  background:linear-gradient(135deg,#fff 30%,var(--accent-1),var(--accent-2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;animation:fadeUp .8s ease-out;
}
.hero p{
  color:var(--text-secondary);font-size:15px;max-width:480px;
  margin:0 auto;animation:fadeUp .8s ease-out .1s both;
}
.hero-stats{
  display:flex;justify-content:center;gap:20px;margin-top:16px;
  font-size:13px;color:var(--text-tertiary);animation:fadeUp .8s ease-out .2s both;
}
.hero-stats .live-count{color:var(--live);font-weight:700}
.hero-featured{
  margin-top:24px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
  animation:fadeUp .8s ease-out .3s both;
}
.featured-card{
  display:flex;align-items:center;gap:14px;
  padding:10px 16px;border-radius:var(--radius);
  background:var(--bg-card);border:1px solid rgba(255,45,85,.2);
  text-align:left;max-width:580px;width:100%;transition:all .3s;position:relative;overflow:hidden;
}
.featured-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,45,85,.06),transparent 60%);
  pointer-events:none;
}
.featured-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(255,45,85,.12);
  border-color:rgba(255,45,85,.35);
}
.featured-badge{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:var(--radius-full);
  background:rgba(255,45,85,.12);color:var(--live);
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;
}
.featured-badge .dot{
  width:5px;height:5px;border-radius:50%;background:var(--live);
  animation:pulse 1.5s infinite;
}
.featured-info{flex:1;min-width:0}
.featured-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.featured-meta{font-size:11px;color:var(--text-secondary);margin-top:1px}
.featured-arrow{color:var(--text-tertiary);font-size:16px;flex-shrink:0;transition:transform .3s}
.featured-card:hover .featured-arrow{transform:translateX(4px);color:var(--accent-2)}

.content{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 24px 32px}
.filter-bar{
  display:flex;gap:6px;padding:16px 0 20px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;padding:7px 18px;border-radius:var(--radius-full);
  background:var(--bg-card);border:1px solid var(--line);
  font-size:12px;font-weight:500;color:var(--text-secondary);
  transition:all .25s;white-space:nowrap;
}
.filter-chip:hover{border-color:var(--text-tertiary);color:var(--text);transform:translateY(-1px)}
.filter-chip.active{
  background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
  border-color:transparent;color:#fff;font-weight:600;
  box-shadow:0 2px 16px rgba(255,45,85,.25);
}
.filter-chip .count{opacity:.45;margin-left:4px}
.filter-chip.active .count{opacity:.8}
.live-chip{display:inline-flex;align-items:center;gap:5px}
.live-chip .dot{width:5px;height:5px;border-radius:50%;background:var(--live);animation:pulse 1.5s infinite}

@keyframes pulse{0%{opacity:1}50%{opacity:.35}100%{opacity:1}}

.events-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;
}

.event-card{
  display:block;position:relative;overflow:hidden;
  background:var(--bg-card);border:1px solid var(--line);
  border-radius:var(--radius);padding:20px;
  transition:all .35s cubic-bezier(.4,0,.2,1);
  animation:cardIn .5s ease-out both;
}
.event-card::before{
  content:'';position:absolute;inset:0;border-radius:var(--radius);
  opacity:0;transition:opacity .35s;
  background:linear-gradient(135deg,rgba(121,54,247,.04),transparent 60%);
  pointer-events:none;
}
.event-card:hover{
  border-color:var(--line-hover);transform:translateY(-4px);
  box-shadow:var(--shadow),0 0 0 1px rgba(121,54,247,.08);
}
.event-card:hover::before{opacity:1}
.event-card.live{border-color:rgba(255,45,85,.2)}
.event-card.live:hover{border-color:rgba(255,45,85,.4);box-shadow:var(--shadow),0 0 0 1px rgba(255,45,85,.08)}
.event-card.starting-soon{border-color:rgba(250,204,21,.15)}
.event-card.starting-soon:hover{border-color:rgba(250,204,21,.3)}

.event-card .glow-bar{
  position:absolute;top:0;left:0;right:0;height:2px;
  opacity:0;transition:opacity .35s;
}
.event-card:hover .glow-bar{opacity:1}
.event-card.live .glow-bar{background:linear-gradient(90deg,var(--live),rgba(255,45,85,.2));opacity:1}
.event-card.starting-soon .glow-bar{background:linear-gradient(90deg,#facc15,rgba(250,204,21,.2));opacity:1}
.event-card.upcoming .glow-bar{background:linear-gradient(90deg,var(--text-tertiary),transparent)}

@keyframes cardIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.event-card:nth-child(1){animation-delay:.05s}
.event-card:nth-child(2){animation-delay:.1s}
.event-card:nth-child(3){animation-delay:.15s}
.event-card:nth-child(4){animation-delay:.2s}
.event-card:nth-child(5){animation-delay:.25s}
.event-card:nth-child(6){animation-delay:.3s}
.event-card:nth-child(7){animation-delay:.35s}
.event-card:nth-child(8){animation-delay:.4s}

.event-top{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.event-sport{
  font-size:9px;font-weight:700;letter-spacing:.8px;
  padding:3px 10px;border-radius:var(--radius-full);text-transform:uppercase;
}
.event-league{font-size:11px;color:var(--text-secondary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.event-status{
  font-size:9px;font-weight:700;letter-spacing:.6px;
  padding:3px 8px;border-radius:var(--radius-full);text-transform:uppercase;white-space:nowrap;
}
.event-status.live{background:rgba(255,45,85,.12);color:var(--live);animation:statusPulse 2s infinite}
.event-status.soon{background:rgba(250,204,21,.1);color:#facc15}
.event-status.upcoming{background:rgba(255,255,255,.03);color:var(--text-tertiary)}

.event-teams{
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:14px;margin-bottom:14px;
}
.team{text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.team-logo-wrap{
  width:52px;height:52px;border-radius:50%;overflow:hidden;
  background:var(--bg);border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  transition:all .35s;position:relative;
}
.event-card:hover .team-logo-wrap{border-color:var(--text-tertiary);transform:scale(1.05)}
.event-card.live .team-logo-wrap{border-color:rgba(255,45,85,.25)}
.event-card.live:hover .team-logo-wrap{border-color:rgba(255,45,85,.4)}
.team-logo{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.event-card:hover .team-logo{transform:scale(1.1)}
.team-fallback{
  font-weight:800;font-size:14px;color:var(--text-secondary);
  background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.team-name{font-size:13px;font-weight:600;line-height:1.2}
.vs-block{text-align:center;min-width:65px}
.vs-text{
  font-size:12px;font-weight:800;letter-spacing:1px;
  background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.event-card.live .vs-text{-webkit-text-fill-color:var(--live);background:none}
.vs-time{font-size:10px;color:var(--text-tertiary);margin-top:4px;white-space:nowrap}
.event-card.live .vs-time{color:var(--live);font-weight:600}

.event-bottom{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:12px;border-top:1px solid var(--line);
}
.event-cta{
  font-size:11px;font-weight:600;color:var(--text-secondary);
  display:flex;align-items:center;gap:5px;transition:all .3s;
}
.event-card:hover .event-cta{
  background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.event-card.live .event-cta{color:var(--live);-webkit-text-fill-color:var(--live);background:none}
.btn-vlc{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:var(--radius-sm);
  font-size:10px;font-weight:700;color:#ff7518;
  border:1px solid rgba(255,117,24,.2);
  transition:all .2s;white-space:nowrap;
}
.btn-vlc:hover{background:rgba(255,117,24,.1);border-color:rgba(255,117,24,.35)}

.skeleton-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;
}
.skeleton-card{
  background:var(--bg-card);border:1px solid var(--line);
  border-radius:var(--radius);padding:20px;height:220px;
  position:relative;overflow:hidden;
}
.skeleton-shimmer{
  position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 25%,rgba(121,54,247,.03) 50%,transparent 75%);
  background-size:200% 100%;animation:shimmer 1.8s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.65}}

.empty-state{grid-column:1/-1;text-align:center;padding:60px 24px;color:var(--text-secondary)}
.empty-state svg{width:44px;height:44px;color:var(--text-tertiary);margin-bottom:14px;opacity:.35}
.empty-state h3{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:13px}

.footer{
  position:relative;z-index:1;
  text-align:center;padding:28px 24px;
  color:var(--text-tertiary);font-size:12px;
  border-top:1px solid var(--line);margin-top:40px;
}
.footer a{color:var(--accent-2)}
.footer-hint{margin-top:6px;font-size:11px;opacity:.6}

@media(max-width:700px){
  .header-inner{padding:10px 16px;gap:10px}
  .search-wrap{max-width:none}
  .hero{padding:44px 16px 32px}
  .content{padding:0 14px 20px}
  .events-grid{grid-template-columns:1fr}
  .skeleton-grid{grid-template-columns:1fr}
  .featured-card{padding:8px 12px}
  .featured-title{font-size:12px}
  .hero h1{font-size:clamp(24px,8vw,36px)}
}
@media(max-width:400px){.team-logo-wrap{width:44px;height:44px}.team-name{font-size:12px}.vs-block{min-width:55px}}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">
      <span class="logo-icon">Z</span>
      <span class="logo-text">ZEROLIVE</span>
    </a>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" class="search-input" placeholder="Search teams, leagues..." autocomplete="off">
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="refreshBtn" title="Refresh"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg></button>
      <a href="/playlist.m3u" class="btn-m3u" download><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 20 8-12-8-4-4 8z"/><path d="M14 20h8"/><path d="M18 16v4"/></svg>M3U</a>
    </div>
  </div>
</header>

<section class="hero">
  <h1>Live Sports, Zero Bullshit</h1>
  <p>Free streams for football, cricket, basketball, tennis, and more.</p>
  <div class="hero-stats" id="heroInfo"></div>
  <div class="hero-featured" id="heroFeatured"></div>
</section>

<main class="content">
  <nav class="filter-bar" id="filterBar"></nav>
  <div id="eventsGrid"></div>
</main>

<footer class="footer">
  ZeroLive &mdash; Free sports streaming
  <div class="footer-hint"><a href="/playlist.m3u" download>Download M3U</a> &middot; Open in VLC / IPTV app</div>
</footer>

<script>
(function(){
  var E=function(s){return String(s??'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];})};
  var INIT=function(n){return (n||'?').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0].toUpperCase();}).join('');};
  var ESC_INIT=function(n){return E(INIT(n));};
  var SPORT_COLORS={Football:'#ff2d55',Cricket:'#7936f7',Basketball:'#ff6b35',Tennis:'#facc15',Hockey:'#06b6d4',Baseball:'#a855f7','Formula 1':'#ef4444',F1:'#ef4444',Esports:'#22d65e',MMA:'#dc2626',WWE:'#ef4444'};
  var sportColor=function(s){return SPORT_COLORS[s]||'#6b7280';};

  var events=[];
  var activeSport='All';
  var query='';
  var search=document.getElementById('search');
  var filterBar=document.getElementById('filterBar');
  var grid=document.getElementById('eventsGrid');
  var heroFeatured=document.getElementById('heroFeatured');
  var heroInfo=document.getElementById('heroInfo');
  var refreshBtn=document.getElementById('refreshBtn');

  function getStatus(e){
    var now=Date.now();
    var t=Date.parse(e.starts_at);
    if(e.is_live===1) return {type:'live',label:'● LIVE',cls:'live'};
    if(!t) return {type:'upcoming',label:'UNKNOWN',cls:'upcoming'};
    var diff=t-now;
    if(diff<0) return {type:'live',label:'● LIVE',cls:'live'};
    if(diff<3600000) return {type:'soon',label:'STARTING SOON',cls:'soon'};
    return {type:'upcoming',label:'UPCOMING',cls:'upcoming'};
  }

  function getTimeDisplay(e){
    var now=Date.now();
    var t=Date.parse(e.starts_at);
    if(!t)return'';
    var diff=t-now;
    if(diff<0){
      var ago=Math.floor(-diff/1000);
      if(ago<60)return'Started moments ago';
      if(ago<3600){var m=Math.floor(ago/60);return'Started '+m+'m ago';}
      if(ago<86400){var h=Math.floor(ago/3600);var m=Math.floor((ago%3600)/60);return h+'h '+m+'m elapsed';}
      var d=Math.floor(ago/86400);return d+'d ago';
    }else if(diff<3600000){
      var min=Math.floor(diff/60000);
      if(min<1)return'Starting now';
      return'In '+min+' min';
    }else{
      return new Date(t).toLocaleString();
    }
  }

  function showSkeletons(){grid.innerHTML='<div class="skeleton-grid">'+Array(8).fill('<div class="skeleton-card"><div class="skeleton-shimmer"></div></div>').join('')+'</div>';}
  showSkeletons();

  function render(){
    var q=query.trim().toLowerCase();
    var f=events.filter(function(e){
      var s=getStatus(e);
      if(activeSport==='__live__'&&s.type!=='live')return false;
      if(activeSport!=='All'&&activeSport!=='__live__'&&e.sport!==activeSport)return false;
      if(!q)return true;
      return (e.team_a_name||'').toLowerCase().includes(q)||(e.team_b_name||'').toLowerCase().includes(q)||(e.league||'').toLowerCase().includes(q);
    });
    f.sort(function(a,b){return (a.priority||0)-(b.priority||0);});
    if(!f.length){
      grid.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><h3>No events found</h3><p>Try adjusting your filters or search terms.</p></div>';
      return;
    }
    grid.innerHTML=f.map(function(e){
      var slug=e.enc_parent||e.parent||e.id;
      var s=getStatus(e);
      var timeStr=getTimeDisplay(e);
      var color=sportColor(e.sport);
      var live=s.type==='live';
      var soon=s.type==='soon';
      var cls=live?'live':soon?'starting-soon':'upcoming';
      var icon=live?'▶':soon?'⏳':'⌛';
      return '<a class="event-card '+cls+'" href="/watch/'+encodeURIComponent(slug)+'" style="animation-delay:0s">'+
        '<div class="glow-bar"></div>'+
        '<div class="event-top">'+
          '<span class="event-sport" style="background:'+color+'14;color:'+color+'">'+E(e.sport||'Sports')+'</span>'+
          '<span class="event-league">'+E(e.league||'')+'</span>'+
          '<span class="event-status '+s.cls+'">'+s.label+'</span>'+
        '</div>'+
        '<div class="event-teams">'+
          '<div class="team"><div class="team-logo-wrap">'+
            (e.team_a_logo
              ? '<img src="'+E(e.team_a_logo)+'" alt="" class="team-logo" data-init="'+ESC_INIT(e.team_a_name)+'" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'team-fallback\',textContent:this.dataset.init}))">'
              : '<div class="team-fallback">'+ESC_INIT(e.team_a_name)+'</div>')+
          '</div><div class="team-name">'+E(e.team_a_name)+'</div></div>'+
          '<div class="vs-block"><div class="vs-text">VS</div><div class="vs-time">'+timeStr+'</div></div>'+
          '<div class="team"><div class="team-logo-wrap">'+
            (e.team_b_logo
              ? '<img src="'+E(e.team_b_logo)+'" alt="" class="team-logo" data-init="'+ESC_INIT(e.team_b_name)+'" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'team-fallback\',textContent:this.dataset.init}))">'
              : '<div class="team-fallback">'+ESC_INIT(e.team_b_name)+'</div>')+
          '</div><div class="team-name">'+E(e.team_b_name)+'</div></div>'+
        '</div>'+
        '<div class="event-bottom">'+
          '<span style="display:flex;align-items:center;gap:6px">'+
            '<span class="event-cta">'+icon+' '+(live?'Watch Live':soon?'View Stream':'View Stream')+'</span>'+
            '<span class="btn-vlc" data-vlc-slug="'+E(slug)+'" onclick="event.stopPropagation();openInVLC(this.dataset.vlcSlug)" title="Open in VLC">VLC</span>'+
          '</span>'+
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text-tertiary);opacity:.35"><path d="M9 18l6-6-6-6"/></svg>'+
        '</div></a>';
    }).join('');
    clearTimeout(window._timer);
    window._timer=setTimeout(function(){render();},30000);
  }

  function renderFilters(){
    var counts=new Map();counts.set('All',events.length);
    var liveCount=0;var nowCount=0;
    for(var i=0;i<events.length;i++){
      var e=events[i];var s=e.sport||'Other';
      counts.set(s,(counts.get(s)||0)+1);
      if(getStatus(e).type==='live')liveCount++;
      if(Date.parse(e.starts_at))nowCount++;
    }
    var sports=['All'];
    var keys=Array.from(counts.keys()).filter(function(s){return s!=='All';}).sort();
    sports=sports.concat(keys);
    filterBar.innerHTML=sports.map(function(s){
      return '<button class="filter-chip '+(activeSport===s?'active':'')+'" data-sport="'+E(s)+'">'+E(s)+' <span class="count">'+(counts.get(s)||0)+'</span></button>';
    }).join('');
    filterBar.querySelectorAll('.filter-chip').forEach(function(el){
      el.addEventListener('click',function(){activeSport=el.dataset.sport;renderFilters();render();});
    });
    if(liveCount){
      var chip=document.createElement('button');
      chip.className='filter-chip '+(activeSport==='__live__'?'active':'');
      chip.dataset.sport='__live__';
      chip.innerHTML='<span class="live-chip"><span class="dot"></span> LIVE</span> <span class="count">'+liveCount+'</span>';
      chip.addEventListener('click',function(){activeSport='__live__';renderFilters();render();});
      filterBar.prepend(chip);
    }
    heroInfo.innerHTML='<span class="live-count">● '+liveCount+' live</span> <span style="opacity:.35">·</span> <span>'+nowCount+' events</span>';
    var liveEvents=events.filter(function(e){return getStatus(e).type==='live';}).slice(0,3);
    heroFeatured.innerHTML=liveEvents.map(function(e){
      var slug=e.enc_parent||e.parent||e.id;
      return '<a href="/watch/'+encodeURIComponent(slug)+'" class="featured-card">'+
        '<span class="featured-badge"><span class="dot"></span> LIVE</span>'+
        '<span class="featured-info"><span class="featured-title">'+E(e.team_a_name)+' vs '+E(e.team_b_name)+'</span>'+
        '<span class="featured-meta">'+E(e.league||e.sport||'')+'</span></span>'+
        '<span class="featured-arrow">→</span></a>';
    }).join('');
  }

  search.addEventListener('input',function(e){query=e.target.value;render();});

  function loadEvents(){
    refreshBtn.classList.add('spinning');
    fetch('/api/upstream/events',{cache:'no-store'}).then(function(r){return r.json();}).then(function(data){
      events=(data&&Array.isArray(data.events))?data.events:(Array.isArray(data)?data:[]);
      renderFilters();render();
    })['catch'](function(){
      grid.innerHTML='<div class="empty-state"><h3>Failed to load events</h3><p>Check your connection and try again.</p></div>';
    }).then(function(){refreshBtn.classList.remove('spinning');});
  }
  refreshBtn.addEventListener('click',loadEvents);
  loadEvents();

  setInterval(function(){
    fetch('/api/upstream/events',{cache:'no-store'}).then(function(r){return r.json();}).then(function(data){
      events=(data&&Array.isArray(data.events))?data.events:(Array.isArray(data)?data:[]);
      renderFilters();render();
    })['catch'](function(){});
  },60000);

  window.openInVLC = function(slug) {
    var m3uUrl = window.location.origin + '/playlist/' + encodeURIComponent(slug) + '.m3u';
    var vlcUrl = 'vlc://' + m3uUrl;
    var timer = setTimeout(function() {
      if (document.hidden) return;
      if (confirm('VLC is not installed on this device.\n\nWould you like to download VLC from videolan.org?')) {
        window.open('https://www.videolan.org/', '_blank');
      }
    }, 2500);
    function onVis() {
      if (document.hidden) { clearTimeout(timer); }
      document.removeEventListener('visibilitychange', onVis);
    }
    document.addEventListener('visibilitychange', onVis);
    window.location.href = vlcUrl;
  };
})();
</script>
</body>
</html>
