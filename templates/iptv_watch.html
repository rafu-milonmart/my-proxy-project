*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* === THEMES === */
:root,[data-theme="dark"]{
  --bg:#07080a;
  --bg-elevated:#0e1015;
  --bg-card:#13161d;
  --bg-hover:#1a1e28;

html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 40% 50% at 20% 10%,rgba(255,45,85,.09),transparent),
    radial-gradient(ellipse 50% 60% at 80% 90%,rgba(121,54,247,.09),transparent),
    radial-gradient(ellipse 30% 30% at 50% 50%,rgba(255,45,85,.04),transparent);
  animation:bgShift 20s ease-in-out infinite;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 10% 80%,rgba(255,45,85,.04),transparent),
    radial-gradient(ellipse 40% 60% at 90% 20%,rgba(121,54,247,.04),transparent);
  animation:bgShift2 25s ease-in-out infinite;
}
.orb{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  filter:blur(80px);animation:orbFloat 12s ease-in-out infinite;
}
.orb-1{width:400px;height:400px;background:rgba(255,45,85,.12);top:-100px;right:-100px;animation-delay:0s}
.orb-2{width:350px;height:350px;background:rgba(121,54,247,.10);bottom:-80px;left:-80px;animation-delay:-4s}
.orb-3{width:300px;height:300px;background:rgba(255,45,85,.06);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-8s}
.orb-4{width:250px;height:250px;background:rgba(255,45,85,.04);top:20%;left:80%;animation-delay:-2s}
.orb-5{width:200px;height:200px;background:rgba(121,54,247,.05);bottom:30%;right:70%;animation-delay:-6s}
@keyframes bgShift{
  0%,100%{transform:translate(0,0)}
  33%{transform:translate(2%,-1%)}
  66%{transform:translate(-1%,2%)}
}
@keyframes bgShift2{
  0%,100%{transform:translate(0,0) rotate(0deg)}
  25%{transform:translate(-2%,2%) rotate(3deg)}
  50%{transform:translate(1%,-1%) rotate(-2deg)}
  75%{transform:translate(-1%,-2%) rotate(4deg)}
}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(30px,-30px) scale(1.1)}
  50%{transform:translate(-20px,20px) scale(.95)}
  75%{transform:translate(15px,30px) scale(1.05)}
}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font:inherit;border:none;background:none;color:inherit}
img{max-width:100%;display:block}
input{font:inherit}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-tertiary);border-radius:var(--radius-full)}
::-webkit-scrollbar-thumb:hover{background:var(--text-secondary)}

/* === HEADER === */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(7,8,10,.8);border-bottom:1px solid var(--line);
}
[data-theme="light"] .header{background:rgba(255,255,255,.85)}
[data-theme="green"] .header{background:rgba(5,13,6,.85)}
[data-theme="aero"] .header{background:rgba(10,14,23,.5);border-bottom:1px solid rgba(255,255,255,.06)}
[data-theme="blue"] .header{background:rgba(7,11,18,.85)}
.header-inner{
  display:flex;align-items:center;gap:12px;
  max-width:1400px;margin:0 auto;padding:10px 20px;
}
.header-logo{
  font-size:18px;font-weight:900;letter-spacing:1px;
  color:var(--accent);white-space:nowrap;
  display:flex;align-items:center;gap:7px;
}
.header-logo span{color:var(--text)}
.header-logo svg{width:20px;height:20px}
.header-back{color:var(--text-secondary);font-size:18px;line-height:1;transition:all .15s;display:flex;padding:2px}
.header-back:hover{color:var(--text)}
.header-info{display:flex;flex-direction:column;margin-left:6px;gap:1px}
.header-info .ch-name{font-size:13px;font-weight:600;color:var(--text)}
.header-info .ch-group{font-size:11px;color:var(--text-tertiary)}

/* Theme switcher */
.theme-wrap{position:relative;margin-left:auto}
.theme-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;border-radius:var(--radius-sm);
  background:var(--bg-card);border:1px solid var(--line);
  font-size:12px;font-weight:600;color:var(--text-secondary);
  transition:all .2s;white-space:nowrap;
}
.theme-btn:hover{border-color:var(--text-tertiary);color:var(--text)}
.theme-panel{
  position:absolute;top:calc(100% + 8px);right:0;
  background:var(--bg-elevated);border:1px solid var(--line-strong);
  border-radius:var(--radius);padding:8px;
  box-shadow:var(--shadow);min-width:160px;
  display:none;z-index:200;
}
.theme-panel.open{display:block}
.theme-opt{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:8px 10px;border-radius:var(--radius-sm);
  font-size:13px;color:var(--text-secondary);transition:all .15s;
}
.theme-opt:hover{background:var(--bg-hover);color:var(--text)}
.theme-opt.active{color:var(--accent);font-weight:600}
.theme-opt .swatch{
  width:16px;height:16px;border-radius:50%;flex-shrink:0;
  border:1px solid var(--line);
}
.theme-opt:hover .swatch{border-color:var(--text-tertiary)}

/* === LAYOUT === */
main{max-width:1200px;margin:0 auto;padding:16px 20px 20px;position:relative;z-index:1}

/* === PLAYER === */
.player-wrap{
  position:relative;border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--line);
  background:#000;
}
.player-clip{overflow:hidden;border-radius:var(--radius);position:relative}
.player-wrap:focus-within{box-shadow:var(--shadow),0 0 0 1px var(--accent-glow)}
.player-wrap.playing{box-shadow:var(--shadow),0 0 20px var(--accent-glow);border-color:var(--accent-dim);animation:playerPulse 3s ease-in-out infinite}
@keyframes playerPulse{0%,100%{box-shadow:var(--shadow),0 0 20px var(--accent-glow)}50%{box-shadow:var(--shadow),0 0 35px var(--accent-glow),0 0 60px var(--accent-dim)}}
.player-aspect{
  position:relative;width:100%;
  aspect-ratio:16/9;background:#000;
}
#player-host{width:100%;height:100%}
#player-host video{width:100%;height:100%;display:block;outline:none}

/* Custom controls overlay */
.player-overlay{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;justify-content:space-between;
  opacity:0;transition:opacity .35s ease;
  cursor:default;
}
.player-overlay.visible{opacity:1}
.player-overlay.force-show{opacity:1}
.player-overlay .top-bar{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  background:linear-gradient(180deg,var(--overlay) 0%,transparent 100%);
  pointer-events:auto;
}
.player-overlay .top-bar .live-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:var(--radius-full);
  background:var(--live-dim);color:var(--live);
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
}
.player-overlay .top-bar .live-badge .dot{
  width:5px;height:5px;border-radius:50%;background:var(--live);animation:pulse 1.5s infinite;
}
.ctrl-group{position:relative}
.ctrl-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:var(--radius-full);
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);
  font-size:10px;font-weight:600;cursor:pointer;border:none;
  transition:all .15s;white-space:nowrap;
}
.ctrl-chip:hover{background:rgba(255,255,255,.18);color:#fff}
.ctrl-chip svg{width:10px;height:10px;transition:transform .2s}
.ctrl-chip.open svg{transform:rotate(180deg)}
.ctrl-dropdown{
  position:absolute;top:calc(100% + 6px);right:0;bottom:auto;
  background:rgba(20,25,35,.95);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);
  padding:4px;min-width:100px;max-width:160px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:none;z-index:50;max-height:200px;overflow-y:auto;
}
.ctrl-dropdown.up{top:auto;bottom:calc(100% + 6px)}
.ctrl-dropdown.open{display:block}
.ctrl-dropdown button{
  display:block;width:100%;padding:6px 12px;border-radius:6px;
  font-size:12px;font-weight:500;color:rgba(255,255,255,.7);
  text-align:left;border:none;background:none;cursor:pointer;transition:all .1s;
}
.ctrl-dropdown button:hover{background:rgba(255,255,255,.08);color:#fff}
.ctrl-dropdown button.active{color:var(--accent);font-weight:600;background:rgba(11,148,68,.1)}
.player-overlay .center-play{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);
  width:64px;height:64px;border-radius:50%;
  background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);
  pointer-events:auto;cursor:pointer;
}
.player-overlay .center-play svg{width:26px;height:26px;color:#fff;margin-left:3px}
.player-overlay.paused .center-play{opacity:1;transform:translate(-50%,-50%) scale(1)}
.player-overlay.paused .center-play:hover{transform:translate(-50%,-50%) scale(1.08);background:rgba(0,0,0,.65)}
.player-overlay .bottom-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:8px 12px 10px;
  background:linear-gradient(0deg,var(--overlay) 0%,transparent 100%);
  pointer-events:auto;
}
.player-overlay .controls-row{
  display:flex;align-items:center;gap:8px;
}
.player-overlay .ctrl-btn{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:6px;
  color:rgba(255,255,255,.85);transition:all .15s;flex-shrink:0;
}
.player-overlay .ctrl-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.player-overlay .ctrl-btn svg{width:18px;height:18px}
.player-overlay .ctrl-btn.play-btn svg{margin-left:2px}
.player-overlay .time-display{
  font-size:12px;font-weight:500;color:rgba(255,255,255,.8);
  font-variant-numeric:tabular-nums;white-space:nowrap;letter-spacing:.3px;
}
.player-overlay .time-display .sep{margin:0 3px;opacity:.5}
.progress-wrap{
  position:relative;width:100%;margin:0 4px;
  cursor:pointer;height:24px;display:flex;align-items:center;
}
.progress-track{
  position:relative;width:100%;height:4px;
  background:rgba(255,255,255,.2);border-radius:4px;
  overflow:hidden;transition:height .15s;
}
.progress-wrap:hover .progress-track{height:6px}
.progress-fill{
  height:100%;background:var(--accent);border-radius:4px;
  transition:width .1s linear;position:relative;
}
.progress-fill::after{
  content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);
  width:10px;height:10px;border-radius:50%;
  background:var(--accent);opacity:0;transition:opacity .15s;
  box-shadow:0 0 8px var(--accent-glow);
}
.progress-wrap:hover .progress-fill::after{opacity:1}
.progress-buffer{
  position:absolute;top:0;left:0;height:100%;
  background:rgba(255,255,255,.1);border-radius:4px;
}
.volume-wrap{position:relative;display:flex;align-items:center}
.volume-slider{
  width:0;overflow:hidden;transition:width .2s ease;
  display:flex;align-items:center;height:34px;
}
.volume-wrap:hover .volume-slider,
.volume-slider.open{width:80px}
.volume-slider input[type=range]{
  width:70px;height:4px;-webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,.2);border-radius:4px;outline:none;margin:0 6px;
}
.volume-slider input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;
}
.volume-slider input[type=range]::-moz-range-thumb{
  width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;border:none;
}

/* Spinner */
.spinner-overlay{
  position:absolute;inset:0;z-index:5;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.5);transition:opacity .3s;
}
.spinner-overlay.hidden{opacity:0;pointer-events:none}
.spinner{
  width:36px;height:36px;border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.player-placeholder{
  position:absolute;inset:0;z-index:2;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-secondary);font-size:14px;padding:20px;
  background:var(--bg);text-align:center;
}

/* === CHANNEL INFO === */
.channel-header{
  margin-top:16px;
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:16px 20px;
}
.channel-header .ch-name{font-size:16px;font-weight:700;color:var(--text)}
.channel-header .ch-group{font-size:12px;color:var(--text-tertiary);padding:2px 8px;border-radius:var(--radius-full);background:var(--bg-hover)}

/* Info overlay */
.info-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
}
.info-overlay.open{display:flex}
.info-content{
  background:var(--bg-elevated);border:1px solid var(--line-strong);
  border-radius:var(--radius);max-width:400px;width:90%;
  box-shadow:var(--shadow);overflow:hidden;
}
.info-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--line);
  font-weight:600;font-size:14px;
}
.info-header button{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-secondary);font-size:18px;transition:all .15s;
}
.info-header button:hover{background:var(--bg-hover);color:var(--text)}
.info-body{padding:14px 16px;font-size:13px;line-height:1.6}
.info-body .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--line)}
.info-body .row:last-child{border-bottom:none}
.info-body .label{color:var(--text-tertiary)}
.info-body .value{color:var(--text);font-weight:500;text-align:right;word-break:break-all}

.footer{text-align:center;padding:24px;color:var(--text-tertiary);font-size:13px;margin-top:16px;border-top:1px solid var(--line);position:relative;z-index:1}

/* === RESPONSIVE === */
@media(max-width:700px){
  .header-inner{padding:8px 12px;gap:8px}
  .theme-opt{font-size:12px;padding:6px 8px}
  .theme-panel{right:0;left:auto}
  main{padding:10px 12px 14px}
  .player-overlay .ctrl-btn{width:30px;height:30px}
  .player-overlay .ctrl-btn svg{width:16px;height:16px}
  .player-overlay .center-play{width:52px;height:52px}
  .player-overlay .center-play svg{width:22px;height:22px}
  .player-overlay .bottom-bar{padding:6px 8px 8px}
  .player-overlay .top-bar{padding:8px 10px}
  .player-overlay .time-display{font-size:11px}
  .volume-wrap:hover .volume-slider,.volume-slider.open{width:60px}
  .volume-slider input[type=range]{width:50px}
  .channel-header{padding:12px 14px;flex-wrap:wrap}
}
@media(max-width:450px){
  .header-logo{font-size:15px}
  .header-logo svg{width:16px;height:16px}
  .theme-btn{padding:5px 8px;font-size:11px}
  .theme-panel{right:-6px}
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>
<div class="orb orb-5"></div>

<header class="header">
  <div class="header-inner">
    <a href="/iptv" class="header-back" aria-label="Back to IPTV">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
    </a>
    <a href="/" class="header-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      ZERO<span>LIVE</span>
    </a>
    <div class="header-info">
      <span class="ch-name">{{ channel.name }}</span>
      {% if channel.group %}<span class="ch-group">{{ channel.group }}</span>{% endif %}
    </div>
    <div class="theme-wrap">
      <button class="theme-btn" id="themeToggle" title="Switch theme">
        <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <span id="themeLabel">Dark</span>
      </button>
      <div class="theme-panel" id="themePanel">
        <button class="theme-opt active" data-theme="dark"><span class="swatch" style="background:#07080a;border-color:#333"></span>Dark</button>
        <button class="theme-opt" data-theme="light"><span class="swatch" style="background:#f5f7fa;border-color:#ddd"></span>Light</button>
        <button class="theme-opt" data-theme="system"><span class="swatch" style="background:linear-gradient(135deg,#f5f7fa 50%,#07080a 50%);border-color:#777"></span>System</button>
        <button class="theme-opt" data-theme="green"><span class="swatch" style="background:#0d2412;border-color:#22d65e"></span>Green</button>
        <button class="theme-opt" data-theme="aero"><span class="swatch" style="background:linear-gradient(135deg,#0a0e17,#1a1f2e);border-color:#60a5fa"></span>Aero Glass</button>
        <button class="theme-opt" data-theme="blue"><span class="swatch" style="background:#111b30;border-color:#3b82f6"></span>Blue</button>
        <button class="theme-opt" data-theme="cyberpunk"><span class="swatch" style="background:#1a1630;border-color:#ff2d95"></span>Cyberpunk</button>
        <button class="theme-opt" data-theme="sunset"><span class="swatch" style="background:#241016;border-color:#ff6b35"></span>Sunset</button>
        <button class="theme-opt" data-theme="nord"><span class="swatch" style="background:#17222e;border-color:#88c0d0"></span>Nord</button>
        <button class="theme-opt" data-theme="matrix"><span class="swatch" style="background:#101a10;border-color:#00ff41"></span>Matrix</button>
        <button class="theme-opt" data-theme="midnight"><span class="swatch" style="background:#14142a;border-color:#6366f1"></span>Midnight</button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="player-wrap" id="playerWrap">
    <div class="player-clip">
    <div class="player-aspect">
      <div id="player-host">
        <video id="video" autoplay playsinline preload="auto" style="width:100%;height:100%;display:none"></video>
      </div>
      <div class="player-placeholder" id="playerPlaceholder">
        <div>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 10px;display:block;opacity:.4"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Loading stream...
        </div>
      </div>
      <div class="spinner-overlay hidden" id="spinnerOverlay"><div class="spinner"></div></div>
      </div>
    </div>
    <div class="player-overlay visible paused" id="playerOverlay">
        <div class="top-bar">
          <span class="live-badge" id="liveBadge" style="display:none"><span class="dot"></span> LIVE</span>
        </div>
        <button class="center-play" id="centerPlay" aria-label="Play/Pause">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="8 5 19 12 8 19 8 5"/></svg>
        </button>
        <div class="bottom-bar">
          <div class="controls-row">
            <button class="ctrl-btn play-btn" id="playBtn" aria-label="Play/Pause">
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="8 5 19 12 8 19 8 5"/></svg>
            </button>
            <span class="time-display"><span id="currentTime">0:00</span><span class="sep"> / </span><span id="totalTime">0:00</span></span>
            <div class="progress-wrap" style="flex:1;margin:0 4px" id="progressWrap">
              <div class="progress-track">
                <div class="progress-buffer" id="progressBuffer"></div>
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
              </div>
            </div>
            <div class="volume-wrap">
              <button class="ctrl-btn" id="volumeBtn" aria-label="Volume">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
              </button>
              <div class="volume-slider" id="volumeSlider">
                <input type="range" id="volumeRange" min="0" max="1" step=".05" value="1">
              </div>
            </div>
            <button class="ctrl-btn" id="pipBtn" aria-label="Picture in Picture" style="display:none">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v4M9 21H5a2 2 0 01-2-2v-4m0-8V5a2 2 0 012-2h4m2 10h6a1 1 0 011 1v4a1 1 0 01-1 1h-6a1 1 0 01-1-1v-4a1 1 0 011-1z"/></svg>
            </button>
            <div class="ctrl-group">
              <button class="ctrl-chip" id="speedBtn" style="font-size:11px;padding:2px 8px">1x</button>
              <div class="ctrl-dropdown up" id="speedDropdown">
                <button data-speed="0.5">0.5x</button>
                <button data-speed="0.75">0.75x</button>
                <button data-speed="1" class="active">Normal</button>
                <button data-speed="1.25">1.25x</button>
                <button data-speed="1.5">1.5x</button>
                <button data-speed="2">2x</button>
                <button data-speed="3">3x</button>
              </div>
            </div>
            <button class="ctrl-btn" id="shareBtn" aria-label="Share" style="display:none">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
            </button>
            <button class="ctrl-btn" id="infoBtn" aria-label="Info">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            </button>
            <button class="ctrl-btn" id="fullscreenBtn" aria-label="Fullscreen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
            </button>
          </div>
        </div>
      </div>
  </div>

  <div class="channel-header">
    <span class="ch-name">{{ channel.name }}</span>
    {% if channel.group %}<span class="ch-group">{{ channel.group }}</span>{% endif %}
    {% if channel.tvg_id %}<span class="ch-group" style="background:var(--accent-dim);color:var(--accent)">{{ channel.tvg_id }}</span>{% endif %}
  </div>
</main>

<div class="info-overlay" id="infoOverlay">
  <div class="info-content">
    <div class="info-header"><span>Stream Info</span><button id="infoClose">&times;</button></div>
    <div class="info-body" id="infoBody"></div>
  </div>
</div>

<footer class="footer">ZeroLive 2 &mdash; IPTV Sports</footer>

<script>
(function(){
  var channel = {{ channel|tojson }};
  var video = document.getElementById('video');
  var placeholder = document.getElementById('playerPlaceholder');
  var spinner = document.getElementById('spinnerOverlay');
  var overlay = document.getElementById('playerOverlay');
  var playBtn = document.getElementById('playBtn');
  var centerPlay = document.getElementById('centerPlay');
  var progressFill = document.getElementById('progressFill');
  var progressBuffer = document.getElementById('progressBuffer');
  var progressWrap = document.getElementById('progressWrap');
  var currentTimeEl = document.getElementById('currentTime');
  var totalTimeEl = document.getElementById('totalTime');
  var volumeBtn = document.getElementById('volumeBtn');
  var volumeRange = document.getElementById('volumeRange');
  var volumeSlider = document.getElementById('volumeSlider');
  var fullscreenBtn = document.getElementById('fullscreenBtn');
  var liveBadge = document.getElementById('liveBadge');
  var pipBtn = document.getElementById('pipBtn');
  var speedBtn = document.getElementById('speedBtn');
  var speedDropdown = document.getElementById('speedDropdown');
  var infoBtn = document.getElementById('infoBtn');
  var infoOverlay = document.getElementById('infoOverlay');
  var infoBody = document.getElementById('infoBody');
  var infoClose = document.getElementById('infoClose');
  var shareBtn = document.getElementById('shareBtn');
  var playerWrap = document.getElementById('playerWrap');
  var hideTimer = null;
  var isSeeking = false;
  var player = null;
  var isLiveStream = false;

  function L(m){try{console.log('[ZL2]',m)}catch(_){}}

  L('Channel:', channel.name, 'URL:', channel.url);

  var url = '/proxy/iptv/' + channel.id + '/';

  function formatTime(s){
    if(!s||!isFinite(s))return'0:00';
    var m=Math.floor(s/60),sec=Math.floor(s%60);
    return m+':'+(sec<10?'0':'')+sec;
  }

  function updatePlayBtn(playing){
    var s='<svg viewBox="0 0 24 24" fill="currentColor">';
    if(playing){
      s+='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    }else{
      s+='<polygon points="8 5 19 12 8 19 8 5"/>';
    }
    s+='</svg>';
    playBtn.innerHTML=s;
    centerPlay.innerHTML=s;
    overlay.classList.toggle('paused',!playing);
  }

  function showVideo() {
    placeholder.style.display='none';
    video.style.display='block';
  }

  function showPlaceholder(msg) {
    placeholder.style.display='flex';
    placeholder.innerHTML='<div><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 10px;display:block;opacity:.4"><polygon points="5 3 19 12 5 21 5 3"/></svg>'+msg+'</div>';
    video.style.display='none';
    overlay.classList.add('visible');
    overlay.classList.add('paused');
    spinner.classList.add('hidden');
  }

  function setLiveMode(live){
    isLiveStream=live;
    liveBadge.style.display=live?'inline-flex':'none';
  }

  function destroyPlayer() {
    if(player){
      try{
        if(player.destroy&&typeof player.destroy==='function'){player.destroy();}
        else if(player.reset&&typeof player.reset==='function'){player.reset();}
        else if(player.detachMedia&&typeof player.detachMedia==='function'){player.detachMedia();}
        else if(player.stop&&typeof player.stop==='function'){try{player.stop();}catch(_){}}
      }catch(_){}
      player=null;
    }
    video.removeAttribute('src');
    video.load();
    progressFill.style.width='0%';
    progressBuffer.style.width='0%';
    currentTimeEl.textContent='0:00';totalTimeEl.textContent='0:00';
    liveBadge.style.display='none';
  }

  function startPlay() {
    video.muted=true;
    video.play().then(function(){
      setTimeout(function(){video.muted=false;},100);
    })['catch'](function(){});
  }

  function loadStream() {
    destroyPlayer();
    showPlaceholder('Loading stream...');
    spinner.classList.remove('hidden');
    try{
      var isHls = channel.url && channel.url.includes('.m3u8');
      if(isHls && typeof Hls!=='undefined' && Hls.isSupported()){
        showVideo();
        var h = new Hls({
          enableWorker:true,maxBufferLength:60,maxMaxBufferLength:300,
          backbufferLength:60,liveSyncDuration:15,liveMaxLatencyDuration:60
        });
        h.on(Hls.Events.MANIFEST_PARSED,function(){
          if(h.live)setLiveMode(true);
          spinner.classList.add('hidden');
        });
        h.on(Hls.Events.ERROR,function(e,data){
          if(data.fatal){L('HLS fatal error');spinner.classList.add('hidden');}
        });
        h.attachMedia(video);
        h.loadSource(url);
        player=h;
        startPlay();
      }else if(isHls && video.canPlayType('application/vnd.apple.mpegurl')){
        showVideo();video.src=url;startPlay();
      }else{
        showVideo();video.src=url;startPlay();
      }
    }catch(e){
      showPlaceholder('Error: '+e.message);
      spinner.classList.add('hidden');
    }
  }

  loadStream();

  /* ---- Custom Player Controls ---- */

  function showControls(){overlay.classList.add('visible');clearTimeout(hideTimer);}
  function hideControls(){if(!video.paused&&!isSeeking){overlay.classList.remove('visible');}}
  function resetHideTimer(){
    showControls();
    clearTimeout(hideTimer);
    if(!video.paused)hideTimer=setTimeout(hideControls,3000);
  }

  video.addEventListener('play',function(){updatePlayBtn(true);resetHideTimer();});
  video.addEventListener('pause',function(){updatePlayBtn(false);showControls();clearTimeout(hideTimer);});
  video.addEventListener('loadedmetadata',function(){
    if(video.duration===Infinity||!isFinite(video.duration))setLiveMode(true);
    if(video.duration&&isFinite(video.duration))totalTimeEl.textContent=formatTime(video.duration);
  });
  video.addEventListener('durationchange',function(){
    if(video.duration&&isFinite(video.duration))totalTimeEl.textContent=formatTime(video.duration);
  });
  video.addEventListener('timeupdate',function(){
    var d=video.duration;
    if(d&&isFinite(d)){
      var ct=video.currentTime;
      if(isLiveStream&&player&&isFinite(d)&&player.liveSyncPosition!==undefined&&player.liveSyncPosition>0){
        var windowStart=player.liveSyncPosition-d;
        if(ct>windowStart)ct=ct-windowStart;
        if(ct<0)ct=0;if(ct>d)ct=d;
      }else{
        if(ct>d)ct=d;
      }
      progressFill.style.width=(ct/d*100)+'%';
      currentTimeEl.textContent=formatTime(ct);
      totalTimeEl.textContent=formatTime(d);
    }else{
      currentTimeEl.textContent=formatTime(video.currentTime);
    }
  });
  video.addEventListener('progress',function(){
    if(video.buffered&&video.buffered.length){
      var b=video.buffered.end(video.buffered.length-1);
      if(video.duration){
        progressBuffer.style.width=(b/video.duration*100)+'%';
      }
    }
  });
  video.addEventListener('waiting',function(){spinner.classList.remove('hidden');});
  video.addEventListener('canplay',function(){spinner.classList.add('hidden');});
  video.addEventListener('playing',function(){spinner.classList.add('hidden');playerWrap.classList.add('playing');});
  video.addEventListener('pause',function(){playerWrap.classList.remove('playing');});
  video.addEventListener('waiting',function(){playerWrap.classList.remove('playing');});

  playBtn.addEventListener('click',function(){if(video.paused)video.play();else video.pause();});
  centerPlay.addEventListener('click',function(){if(video.paused)video.play();else video.pause();});

  function seek(e,el){
    var r=el.getBoundingClientRect();
    var p=(e.clientX-r.left)/r.width;
    if(video.duration){video.currentTime=p*video.duration;}
  }
  progressWrap.addEventListener('mousedown',function(e){isSeeking=true;seek(e,this);});
  document.addEventListener('mouseup',function(){isSeeking=false;resetHideTimer();});
  document.addEventListener('mousemove',function(e){if(isSeeking)seek(e,progressWrap);});
  progressWrap.addEventListener('click',function(e){if(!isSeeking)seek(e,this);});

  function updateVolumeIcon(){
    var v=video.muted?0:video.volume;
    var s='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">';
    if(v===0){s+='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';}
    else if(v<.5){s+='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/>';}
    else{s+='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/>';}
    s+='</svg>';
    volumeBtn.innerHTML=s;
  }

  volumeBtn.addEventListener('click',function(){video.muted=!video.muted;updateVolumeIcon();volumeSlider.classList.toggle('open');});
  volumeRange.addEventListener('input',function(){video.volume=parseFloat(this.value);video.muted=false;updateVolumeIcon();});
  video.addEventListener('volumechange',function(){volumeRange.value=video.muted?0:video.volume;updateVolumeIcon();});
  updateVolumeIcon();

  fullscreenBtn.addEventListener('click',function(){
    if(document.fullscreenElement){document.exitFullscreen();}
    else if(playerWrap.requestFullscreen){playerWrap.requestFullscreen();}
  });

  /* PiP */
  if('pictureInPictureEnabled' in document){
    pipBtn.style.display='flex';
    pipBtn.addEventListener('click',function(){
      if(document.pictureInPictureElement){document.exitPictureInPicture();}
      else if(video.requestPictureInPicture){video.requestPictureInPicture();}
    });
  }

  /* Speed */
  speedBtn.addEventListener('click',function(e){
    e.stopPropagation();
    speedDropdown.classList.toggle('open');
  });
  speedDropdown.addEventListener('click',function(e){
    var btn=e.target.closest('button');
    if(!btn)return;
    speedDropdown.querySelectorAll('button').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    speedBtn.textContent=btn.textContent;
    video.playbackRate=parseFloat(btn.dataset.speed);
    speedDropdown.classList.remove('open');
  });

  overlay.addEventListener('mousemove',resetHideTimer);
  overlay.addEventListener('touchstart',function(){overlay.classList.toggle('force-show');clearTimeout(hideTimer);});

  /* Keyboard */
  document.addEventListener('keydown',function(e){
    if(e.target.tagName==='INPUT')return;
    if(e.code==='Space'){e.preventDefault();if(video.paused)video.play();else video.pause();}
    if(e.code==='ArrowLeft'){video.currentTime=Math.max(0,video.currentTime-10);}
    if(e.code==='ArrowRight'){video.currentTime=Math.min(video.duration||0,video.currentTime+10);}
    if(e.code==='KeyF'){fullscreenBtn.click();}
    if(e.code==='KeyM'){video.muted=!video.muted;updateVolumeIcon();}
    if(e.code==='KeyI'&&!e.ctrlKey&&!e.metaKey){
      e.preventDefault();
      if(infoOverlay.classList.contains('open'))infoOverlay.classList.remove('open');
      else showInfo();
    }
  });

  /* Close dropdowns on outside click */
  document.addEventListener('click',function(){
    speedDropdown.classList.remove('open');
  });

  /* ---- Share ---- */
  if(navigator.share){
    shareBtn.style.display='flex';
    shareBtn.addEventListener('click',function(){
      navigator.share({title:channel.name,url:window.location.href})['catch'](function(){});
    });
  }else if(navigator.clipboard){
    shareBtn.style.display='flex';
    shareBtn.addEventListener('click',function(){
      navigator.clipboard.writeText(window.location.href).then(function(){
        showToast('Link copied to clipboard!');
      })['catch'](function(){});
    });
  }

  /* ---- Persistent Speed ---- */
  var savedSpeed=localStorage.getItem('zl2-speed');
  if(savedSpeed){
    try{
      var sp=parseFloat(savedSpeed);
      if(sp>0&&sp<=16){
        video.playbackRate=sp;
        speedDropdown.querySelectorAll('button').forEach(function(b){
          var match=Math.abs(parseFloat(b.dataset.speed)-sp)<.01;
          b.classList.toggle('active',match);
          if(match)speedBtn.textContent=b.textContent;
        });
      }
    }catch(_){}
  }
  speedDropdown.addEventListener('click',function(e){
    var btn=e.target.closest('button');
    if(!btn)return;
    localStorage.setItem('zl2-speed',btn.dataset.speed);
  });

  /* ---- Double-tap Fullscreen ---- */
  var lastTap=0;
  video.addEventListener('touchstart',function(e){
    var now=Date.now();
    if(now-lastTap<400&&e.touches.length===1){
      e.preventDefault();
      fullscreenBtn.click();
      lastTap=0;
    }else{
      lastTap=now;
    }
  });

  /* ---- Stream Info ---- */
  function showInfo(){
    var info=[];
    info.push({label:'Channel',value:channel.name});
    info.push({label:'Group',value:channel.group||'-'});
    info.push({label:'URL',value:channel.url});
    info.push({label:'Player',value:player?player.constructor.name:'native'});
    if(video.duration&&isFinite(video.duration)){
      info.push({label:'Duration',value:formatTime(video.duration)});
    }
    info.push({label:'Volume',value:Math.round((video.muted?0:video.volume)*100)+'%'});
    info.push({label:'Speed',value:video.playbackRate+'x'});
    info.push({label:'Resolution',value:video.videoWidth+'x'+video.videoHeight});
    infoBody.innerHTML=info.map(function(i){
      return '<div class="row"><span class="label">'+i.label+'</span><span class="value">'+i.value+'</span></div>';
    }).join('');
    infoOverlay.classList.add('open');
  }

  infoBtn.addEventListener('click',function(){showInfo();});
  infoClose.addEventListener('click',function(){infoOverlay.classList.remove('open');});
  infoOverlay.addEventListener('click',function(e){if(e.target===infoOverlay)infoOverlay.classList.remove('open');});

  /* ---- Theme ---- */
  var themeNames={dark:'Dark',light:'Light',green:'Green',aero:'Aero Glass',blue:'Blue',cyberpunk:'Cyberpunk',sunset:'Sunset',nord:'Nord',matrix:'Matrix',midnight:'Midnight',system:'System'};
  var themeIcons={dark:'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>',light:'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>',green:'<path d="M2 22L12 2l10 20H2z"/><circle cx="12" cy="16" r="2"/>',aero:'<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>',blue:'<circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>',cyberpunk:'<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor"/>',sunset:'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/>',nord:'<path d="M12 2a10 10 0 000 20 10 10 0 000-20z"/><path d="M2 12h20"/>',matrix:'<path d="M2 22L12 2l10 20H2z"/>',midnight:'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/><circle cx="12" cy="8" r="1" fill="currentColor"/>',system:'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/><circle cx="12" cy="12" r="5"/><path d="M2 12h20M12 2v20"/>'};
  var themeToggle=document.getElementById('themeToggle');
  var themeIcon=document.getElementById('themeIcon');
  var themeLabel=document.getElementById('themeLabel');
  var themePanel=document.getElementById('themePanel');
  var currentTheme=localStorage.getItem('zl2-theme')||'dark';
  var systemDarkQuery=window.matchMedia('(prefers-color-scheme:dark)');
  function resolveTheme(t){
    if(t==='system')return systemDarkQuery.matches?'dark':'light';
    return t;
  }
  function applyTheme(t){
    currentTheme=t;
    var resolved=resolveTheme(t);
    document.documentElement.dataset.theme=resolved;
    themeIcon.innerHTML=themeIcons[t]||themeIcons.dark;
    themeLabel.textContent=themeNames[t]||'Dark';
    localStorage.setItem('zl2-theme',t);
    themePanel.querySelectorAll('.theme-opt').forEach(function(el){
      el.classList.toggle('active',el.dataset.theme===t);
    });
  }
  applyTheme(currentTheme);
  systemDarkQuery.addEventListener('change',function(){applyTheme(currentTheme);});
  themeToggle.addEventListener('click',function(e){e.stopPropagation();themePanel.classList.toggle('open');});
  themePanel.querySelectorAll('.theme-opt').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();applyTheme(this.dataset.theme);themePanel.classList.remove('open');});
  });
  document.addEventListener('click',function(){themePanel.classList.remove('open');});

  /* ---- Toast ---- */
  function showToast(msg,icon) {
    var t = document.createElement('div');
    if(icon)t.innerHTML=icon+' '+msg;
    else t.textContent = msg;
    Object.assign(t.style, {
      position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',
      background:'rgba(0,0,0,.85)',color:'#fff',padding:'12px 24px',
      borderRadius:'10px',fontSize:'14px',zIndex:'9999',
      backdropFilter:'blur(10px)',border:'1px solid rgba(255,255,255,.1)',
      animation:'fadeIn .3s ease-out'
    });
    document.body.appendChild(t);
    setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(function(){t.remove();},500);},4000);
  }
})();
</script>
</body>
</html>
